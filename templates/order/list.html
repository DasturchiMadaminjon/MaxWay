{% extends 'base.html' %}
{% block content %}
<div class="main-content">
    <div class="section__content section__content--p30">
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-12">
                    <h3 class="title-5 m-b-35">Buyurtmalar Ro'yxati</h3>
                    <div class="table-responsive table-responsive-data2">
                        <table class="table table-data2">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Mijoz</th>
                                    <th>Telefon</th>
                                    <th>Jami Narxi</th>
                                    <th>Sana</th>
                                    <th>Status</th>
                                    <th>Amallar</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for item in orders %}
                                <tr class="tr-shadow">
                                    <td>#{{ item.id }}</td>
                                    <td>{{ item.customer_name }}</td>
                                    <td>{{ item.phone }}</td>
                                    <td>{{ item.total_price }} UZS</td>
                                    <td>{{ item.created_at }}</td>
                                    <td>
                                        <span class="status--denied">{{ item.status }}</span>
                                    </td>
                                    <td>
                                        <div class="table-data-feature">
                                            <a href="{% url 'order_detail' item.id %}" class="item" title="Batafsil">
                                                <i class="zmdi zmdi-eye"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                                <tr class="spacer"></tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
